<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>질량보존법칙 노트</title>
<style>
body{
  font-family:system-ui;
  max-width:800px;
  margin:40px auto;
  line-height:1.7;
}
.blank{
  border-bottom:2px solid black;
  display:inline-block;
  min-width:60px;
  height:1em;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>질량보존법칙</h1>

<p>
화학 반응에서 <span class="blank"></span> 법칙이 성립한다.
</p>

<p>
반응 전 전체 질량은 반응 후 전체 질량과 <span class="blank"></span>.
</p>

</body>
</html>
